version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:latest
    container_name: egcn-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - egcn-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: egcn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - egcn-network

  # Node.js Backend Server
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: egcn-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/egcn
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost
      # MAKE SURE TO UPDATE THESE IN PRODUCTION!
      - JWT_ACCESS_SECRET=your_jwt_access_secret_here
      - JWT_REFRESH_SECRET=your_jwt_refresh_secret_here
      - SMTP_USER=your_email@gmail.com
      - SMTP_PASS=your_app_password
      - RAZORPAY_KEY_ID=your_razorpay_key
      - RAZORPAY_KEY_SECRET=your_razorpay_secret
      - CLOUDINARY_CLOUD_NAME=your_cloud_name
      - CLOUDINARY_API_KEY=your_api_key
      - CLOUDINARY_API_SECRET=your_api_secret
    depends_on:
      - mongo
      - redis
    networks:
      - egcn-network

  # React/Vite Frontend Served via NGINX
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: egcn-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - egcn-network

volumes:
  mongo-data:
  redis-data:

networks:
  egcn-network:
    driver: bridge
